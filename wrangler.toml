name = "fino"
main = "worker.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"

# IMPORTANT:
# After creating KV namespace FINOVANTA_CONTENT in Cloudflare,
# replace the id below with the real KV namespace ID from Cloudflare.
# Binding name can be CONTENT or SITE_CONTENT.
# worker.js supports both, but CONTENT is used here like in the previous setup.
[[kv_namespaces]]
binding = "CONTENT"
id = "bb5f2662b2d645d98f5cecbe8e41c4d7"

# Add this in Cloudflare dashboard as a Secret / Variable:
# ADMIN_PASSWORD = your_admin_password
